<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Discord Overlay Dashboard</title>
  <link rel="stylesheet" href="../overlay/style.css" />
  <style>
    body { overflow: visible; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
    .voice-controls-bar { position: static; left: auto; top: auto; right: auto; bottom: auto; transform: none; cursor: grab; }
    .voice-controls-bar.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <div class="voice-controls-bar" id="voice-controls-bar">
    <div class="controls-container">
      <button class="control-btn" id="btn-mute">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
          <line id="mute-slash" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" style="display: none;" />
        </svg>
      </button>

      <button class="control-btn" id="btn-deafen">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12v5c0 1.66 1.34 3 3 3h3v-8H4v-2c0-4.41 3.59-8 8-8s8 3.59 8 8v2h-4v8h3c1.66 0 3-1.34 3-3v-5c0-5.52-4.48-10-10-10z"/>
          <line id="deafen-slash" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" style="display: none;" />
        </svg>
      </button>

      <button class="control-btn" id="btn-camera">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          <line id="camera-slash" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2" style="display: none;" />
        </svg>
      </button>

      <div class="stream-btn-wrapper" id="stream-btn-wrapper">
        <button class="control-btn" id="btn-stream">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/>
          </svg>
        </button>
        <div class="stream-popup" id="stream-popup">
          <button class="stream-option-btn" id="btn-stream-game">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15 7.5V2H9v5.5l3 3 3-3zM7.5 9H2v6h5.5l3-3-3-3zM9 16.5V22h6v-5.5l-3-3-3 3zM16.5 9l-3 3 3 3H22V9h-5.5z"/></svg>
            Share Game
          </button>
          <button class="stream-option-btn" id="btn-stream-screen">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            Share Screen
          </button>
          <div class="stream-option-divider"></div>
          <button class="stream-option-btn stop" id="btn-stream-stop">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M6 6h12v12H6z"/></svg>
            Stop Stream
          </button>
        </div>
      </div>

      <button class="control-btn" id="btn-soundboard">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/>
        </svg>
      </button>

      <button class="control-btn settings-btn" id="btn-settings">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
      </button>

      <button class="control-btn disconnect" id="btn-disconnect">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M12 9c-2.2 0-4.3.4-6.2 1.1-.5.2-.9.7-.9 1.3v3.2c0 .5.3.9.7 1.1l2.4.8c.4.1.8 0 1.1-.3l1.8-1.8c1 .3 2.1.5 3.1.5s2.1-.2 3.1-.5l1.8 1.8c.3.3.7.4 1.1.3l2.4-.8c.4-.2.7-.6.7-1.1v-3.2c0-.5-.4-1.1-.9-1.3C16.3 9.4 14.2 9 12 9z" transform="rotate(135 12 12)"/>
        </svg>
      </button>
    </div>

    <div class="soundboard-popup" id="soundboard-popup">
      <div class="popup-header">Soundboard</div>
      <div class="popup-grid" id="popup-sound-grid"></div>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
