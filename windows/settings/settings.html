<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Discord Overlay Settings</title>
  <style>
    :root {
      --bg: #0b0d13;
      --panel: #111420;
      --line: #22293b;
      --text: #e6e9f0;
      --muted: #848e9f;
      --accent: #5865f2; /* Discord accent color */
      --accent-hover: #7289da;
      --warning: #ffcf5a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      user-select: none;
      overflow: hidden;
    }
    .wrap {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      height: 100%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      -webkit-app-region: drag;
    }
    header h1 {
      font-size: 13px;
      font-weight: 700;
      margin: 0;
      flex: 1;
    }
    .header-btn {
      -webkit-app-region: no-drag;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .header-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.08);
    }
    main {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      background: var(--panel);
    }
    .icon {
      font-size: 40px;
      color: var(--accent);
    }
    .redirect-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .redirect-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 280px;
      margin: 0;
    }
    .btn-action {
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .btn-action:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 12px rgba(88, 101, 242, 0.4);
    }
    .btn-action:disabled {
      background: var(--line);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }
    .warning-text {
      font-size: 11px;
      color: var(--warning);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>💬 Discord Overlay Settings</h1>
      <button class="header-btn" id="close" title="Close">✕</button>
    </header>
    <main>
      <div class="icon">⚙</div>
      <h2 class="redirect-title">Settings Have Moved</h2>
      <p class="redirect-desc">
        Configuration settings for the Discord Overlay are now centralized inside the central Settings Manager dashboard.
      </p>
      <button class="btn-action" id="launch-btn" disabled>Open Settings Manager</button>
      <div id="status-msg" class="warning-text">Checking Settings Manager status...</div>
    </main>
  </div>

  <script src="settings.js"></script>
</body>
</html>
